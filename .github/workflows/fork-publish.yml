name: Fork-publish (mirror upstream → GHCR)

# Mirror-only fork: byte-identical imagetools copy of Docker Hub `vllm/vllm-openai`
# into ghcr.io/intarweb/vllm-openai so the llm host pulls from our registry, not Docker
# Hub — escaping Docker Hub pull-rate pressure on multi-image rebuilds, and giving us a
# pinned known-good digest to ride while upstream churns. No build-from-source, no
# sync-upstream (we carry no patches; the images are huge CUDA builds we'd never rebuild).
# See FORK_INFO.md.

on:
  schedule:
    - cron: '39 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_IMAGE: vllm/vllm-openai
  TARGET_IMAGE_NAME: vllm-openai
  TAGS: "latest v0.22.1"      # latest (float) + a pinned known-good anchor. Bump the pin as you validate releases.

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🪞 Mirror tags to GHCR
        run: |
          set -uo pipefail
          TARGET="ghcr.io/${{ github.repository_owner }}/${TARGET_IMAGE_NAME}"
          fail=0
          for tag in ${TAGS}; do
            echo "::group::Mirror ${UPSTREAM_IMAGE}:$tag → $TARGET:$tag"
            if docker buildx imagetools inspect "${UPSTREAM_IMAGE}:$tag" >/dev/null 2>&1; then
              if docker buildx imagetools create --tag "$TARGET:$tag" "${UPSTREAM_IMAGE}:$tag"; then
                echo "  ✓ mirrored $tag"
              else echo "::error::failed to mirror $tag"; fail=1; fi
            else echo "  - upstream tag $tag does not exist, skipping"; fi
            echo "::endgroup::"
          done
          exit $fail
