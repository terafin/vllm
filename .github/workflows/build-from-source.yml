name: build-from-source

on:
  push:
    branches:
      - intarweb-dev
  workflow_dispatch:

env:
  IMAGE: ghcr.io/intarweb/vllm-openai
  # GPU archs you actually deploy. 8.0=A100, 8.9=L4/4090, 9.0=H100.
  # Trim this list if you only run one GPU type — smaller = faster build.
  TORCH_CUDA_ARCH_LIST: "8.0;8.9;9.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false
          docker-images: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: vllm-openai
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:latest
          build-args: |
            BUILD_BASE_IMAGE=nvidia/cuda:13.0.2-devel-ubuntu22.04
            max_jobs=2
            nvcc_threads=2
            torch_cuda_arch_list=${{ env.TORCH_CUDA_ARCH_LIST }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
